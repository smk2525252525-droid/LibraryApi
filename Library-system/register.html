<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="Utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New User Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light"> 

    <div class="container d-flex justify-content-center align-items-center vh-100"><!--vh-100=hieght 100% of viewport-->

        <div class="card p-4 shadow" style="width: 500px;">

            <h3 class="text-center mb-3">User Registration</h3>

            <input type="email" id="reg-email" class="form-control mb-3" placeholder="Enter Email"><!--id=reg-email unique identifier for jaavscript-->
            <input type="password" id="reg-password" class="form-control mb-3" placeholder="Enter Password">
            <input type="password" id="confirmpassword" class="form-control mb-3" placeholder="Re-type password">

           <!--<button class="btn btn-success w-100" onclick="register()">register Now </button> registration button-->

           <button id="registerbtn" class="btn btn-success w-100" >Register Now </button><!--assigned id=registerbtn to button for jquery to select and add event listener in app.js -->

            <p class="text-center mt-3">Already have an account?<a href="login.html">Login here</a></p><!--if u already have an account and need to go back to login-->

        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>

</body>


</html>
