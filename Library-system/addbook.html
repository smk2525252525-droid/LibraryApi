<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-brown">
    <div class="container">
                  <a class="navbar-brand" href="dashboard.html">Library Dashboard</a>

        <div class="ms-auto">
            <span id="userEmail" class="text-light fw-bold"></span>

          
            <a href="dashboard.html" class="btn btn-outline-light">
                Dashboard
            </a>
             <a href="login.html" class="btn btn-dark">Logout</a>
        </div>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 70px);">
    <div class="card card-transparent p-4" style="width: 600px;">

        <h3 class="text-center mb-3">Add/Edit Book</h3>

        <input type="text" id="book-title" class="form-control mb-3" placeholder="Book Title">
        <input type="text" id="book-author" class="form-control mb-3" placeholder="Author Name">

       <select id="book-category" class="form-select mb-3">
    <option value="">Select Category</option>
    <option value="1">Fiction</option>
    <option value="2">Science</option>
    <option value="3">History</option>
        </select>

        <select id="book-status" class="form-select mb-3">
            <option value="Available">Available</option>
            <option value="Issued">Issued</option>
        </select>

        <button id="addBookBtn" class="btn btn-success w-50 center-block mx-auto">
            Save Book
        </button>

        <a href="books.html" class="text-center mt-3 d-block">
            Back to Books List
        </a>
    </div>
</div>
<footer class="footer">
  <div class="container text-center">
    <p class="footer-text">
      © 2026 Library Management System. All rights reserved.
    </p>
    <p class="footer-subtext">
      Designed by kumail hasan rizvi
    </p>
  </div>
</footer>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
