 <body class="bg-light"><!-- visible content on page starts here, add background light -->

   <!--<button class="btn btn-success w-100 mb-3" onclick="login()">Sign in</button>   btn boostrap buttonn btn-success colour, w-100 100% width, onclick inline javascript to trigger when button clicked, login() calls javascrypt function login in app.js -->
